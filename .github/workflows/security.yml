name: Security

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm audit --audit-level=high
